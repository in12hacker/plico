<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plico — AI-Native OS 开发进度</title>
    <style>
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-card: #1a1a24;
            --text-primary: #e4e4e7; --text-secondary: #a1a1aa; --text-muted: #71717a;
            --accent: #6366f1; --accent-light: #818cf8; --accent-glow: rgba(99,102,241,0.3);
            --success: #22c55e; --success-bg: rgba(34,197,94,0.15);
            --warning: #f59e0b; --warning-bg: rgba(245,158,11,0.15);
            --error: #ef4444; --error-bg: rgba(239,68,68,0.15);
            --purple: #a855f7; --border: #27272a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; line-height: 1.5; }
        .container { max-width: 1600px; margin: 0 auto; padding: 1.5rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .header-left { display: flex; align-items: center; gap: 1.5rem; }
        .logo { font-size: 1.75rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-meta { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--text-muted); }
        .header-meta span { padding: 0.25rem 0.75rem; background: var(--bg-card); border-radius: 9999px; border: 1px solid var(--border); }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .live-badge { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--success); background: var(--success-bg); padding: 0.5rem 1rem; border-radius: 8px; }
        .live-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: auto; gap: 1rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
        .card-title { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
        .stats-row { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(6, 1fr); gap: 1rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .stat-val.success { color: var(--success); }
        .stat-val.warning { color: var(--warning); }
        .stat-label { font-size: 0.625rem; color: var(--text-muted); text-transform: uppercase; margin-top: 0.25rem; }
        .iterations-card,.plans-card,.docs-card,.gaps-card,.soul-card { grid-column: span 2; }
        .iteration-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .iteration-item { padding: 0.75rem; background: var(--bg-secondary); border-radius: 8px; border-left: 3px solid var(--accent); }
        .iteration-name { font-size: 0.875rem; font-weight: 600; color: var(--accent-light); }
        .iteration-meta { font-size: 0.625rem; color: var(--text-muted); margin-top: 0.25rem; }
        .iteration-phases { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.5rem; }
        .phase-tag { font-size: 0.5rem; padding: 0.125rem 0.5rem; border-radius: 3px; }
        .phase-tag.done { background: var(--success-bg); color: var(--success); }
        .phase-tag.active { background: var(--accent-glow); color: var(--accent-light); border: 1px solid var(--accent); }
        .phase-tag.pending { background: var(--bg-primary); color: var(--text-muted); }
        .plan-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .plan-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; background: var(--bg-secondary); border-radius: 6px; }
        .plan-priority { font-size: 0.5rem; padding: 0.125rem 0.375rem; border-radius: 3px; font-weight: 600; flex-shrink: 0; }
        .plan-priority.p0 { background: var(--error-bg); color: var(--error); }
        .plan-priority.p1 { background: var(--warning-bg); color: var(--warning); }
        .plan-priority.p2 { background: var(--bg-primary); color: var(--text-muted); }
        .plan-content { flex: 1; }
        .plan-title { font-size: 0.75rem; font-weight: 600; }
        .plan-desc { font-size: 0.625rem; color: var(--text-muted); margin-top: 0.25rem; }
        .plan-status { font-size: 0.5rem; padding: 0.125rem 0.5rem; border-radius: 3px; margin-left: auto; flex-shrink: 0; }
        .plan-status.done { background: var(--success-bg); color: var(--success); }
        .plan-status.active { background: var(--accent-glow); color: var(--accent-light); }
        .plan-status.pending { background: var(--bg-primary); color: var(--text-muted); }
        .doc-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .doc-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.75rem; background: var(--bg-secondary); border-radius: 6px; font-size: 0.75rem; }
        .doc-name { font-family: 'Fira Code', monospace; color: var(--text-primary); }
        .doc-path { font-size: 0.625rem; color: var(--text-muted); }
        .gap-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .gap-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; background: var(--bg-secondary); border-radius: 6px; border-left: 3px solid var(--warning); }
        .gap-priority { font-size: 0.5rem; padding: 0.125rem 0.375rem; border-radius: 3px; background: var(--warning-bg); color: var(--warning); font-weight: 600; }
        .gap-text { flex: 1; font-size: 0.75rem; }
        .gap-serves { font-size: 0.625rem; color: var(--text-muted); }
        .soul-card { grid-column: 1 / -1; }
        .soul-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        .soul-meter { padding: 1rem; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .soul-number { font-size: 2rem; font-weight: 700; color: var(--success); }
        .soul-label { font-size: 0.625rem; color: var(--text-muted); text-transform: uppercase; }
        footer { grid-column: 1 / -1; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); text-align: center; font-size: 0.75rem; color: var(--text-muted); }
        .error-msg { padding: 1rem; background: var(--error-bg); border-radius: 8px; color: var(--error); font-size: 0.875rem; text-align: center; margin: 1rem 0; grid-column: 1/-1; display: none; }
        .git-branch { font-family: 'Fira Code', monospace; font-size: 0.625rem; color: var(--accent-light); background: var(--accent-glow); padding: 0.125rem 0.5rem; border-radius: 4px; }
        .git-commit { font-family: 'Fira Code', monospace; font-size: 0.625rem; color: var(--text-muted); }
        @media (max-width: 1200px) { .dashboard { grid-template-columns: 1fr 1fr; } .stats-row { grid-column: span 2; } .iterations-card,.plans-card,.docs-card,.gaps-card,.soul-card { grid-column: span 2; } .soul-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <div class="logo">Plico</div>
                <div class="header-meta">
                    <span id="meta-iteration">iter12</span>
                    <span id="meta-git-branch" class="git-branch">—</span>
                    <span id="meta-git-commit" class="git-commit">—</span>
                </div>
            </div>
            <div class="header-right">
                <div class="live-badge">
                    <div class="live-dot"></div>
                    <span id="live-time">实时监控中</span>
                </div>
            </div>
        </header>
        <div class="dashboard" id="dashboard">
            <div class="error-msg" id="error-msg">
                无法连接 plicod (http://127.0.0.1:7879)。请启动 daemon：<br>
                <code>cargo run --bin plicod -- --root ~/.plico --port 7878</code>
            </div>
        </div>
    </div>
    <script>
        const API = 'http://127.0.0.1:7879';
        let lastUpdate = 0;

        function updateTime() {
            const elapsed = Math.floor((Date.now() - lastUpdate) / 1000);
            document.getElementById('live-time').textContent = elapsed < 5 ? '实时监控中' : '更新于 ' + elapsed + 's 前';
        }
        setInterval(updateTime, 1000);

        function createCard(cls, title) {
            const c = document.createElement('div');
            c.className = 'card ' + cls;
            c.innerHTML = '<div class="card-header"><span class="card-title">' + title + '</span></div>';
            document.getElementById('dashboard').appendChild(c);
            return c;
        }

        function statusClass(s) {
            if (s === 'done' || s === 'completed') return 'done';
            if (s === 'in_progress' || s === 'active') return 'active';
            return 'pending';
        }

        function render(data) {
            lastUpdate = Date.now();
            document.getElementById('meta-iteration').textContent = 'iter' + data.iteration;
            document.getElementById('meta-git-branch').textContent = data.git_branch;
            document.getElementById('meta-git-commit').textContent = data.git_commit.slice(0, 7);
            document.getElementById('error-msg').style.display = 'none';

            // Stats row
            const sr = document.querySelector('.stats-row') || createCard('stats-row', '');
            const planCount = data.plans ? data.plans.length : 0;
            const donePlans = data.plans ? data.plans.filter(p => p.status === 'done').length : 0;
            const iterCount = data.iterations ? data.iterations.length : 0;
            const docCount = data.design_docs ? data.design_docs.length : 0;
            const gapCount = data.key_gaps ? data.key_gaps.length : 0;
            sr.innerHTML = `
                <div class="stat-card"><div class="stat-val">${data.iteration}</div><div class="stat-label">当前迭代</div></div>
                <div class="stat-card"><div class="stat-val">${iterCount}</div><div class="stat-label">Iterations</div></div>
                <div class="stat-card"><div class="stat-val success">${donePlans}/${planCount}</div><div class="stat-label">Plans 完成</div></div>
                <div class="stat-card"><div class="stat-val">${docCount}</div><div class="stat-label">设计文档</div></div>
                <div class="stat-card"><div class="stat-val warning">${gapCount}</div><div class="stat-label">Key Gaps</div></div>
                <div class="stat-card"><div class="stat-val success">${data.soul_alignment_percent}%</div><div class="stat-label">灵魂对齐度</div></div>
            `;

            // Soul alignment meter
            let sg = document.querySelector('.soul-grid');
            if (!sg) {
                const sc = createCard('soul-card', '项目灵魂对齐度');
                sg = document.createElement('div');
                sg.className = 'soul-grid';
                sc.appendChild(sg);
            }
            sg.innerHTML = `
                <div class="soul-meter">
                    <div class="soul-number">${data.soul_alignment_percent}%</div>
                    <div class="soul-label">对齐度</div>
                </div>
                <div style="display:flex;flex-direction:column;gap:0.5rem;grid-column:span 3">
                    <div style="font-size:0.75rem;color:var(--text-secondary)">
                        ${data.key_gaps && data.key_gaps.length > 0
                            ? '关键缺口：' + data.key_gaps.map(g => g.title).join(', ')
                            : '暂无关键缺口'}
                    </div>
                    <div style="font-size:0.625rem;color:var(--text-muted)">
                        Git: ${data.git_branch} @ ${data.git_commit.slice(0, 7)}
                    </div>
                </div>
            `;

            // Iterations
            const ic = document.querySelector('.iterations-card') || createCard('iterations-card', 'Iterations');
            if (data.iterations && data.iterations.length > 0) {
                ic.innerHTML = '<div class="card-header"><span class="card-title">Iterations</span></div>' +
                    '<div class="iteration-list">' +
                    data.iterations.map(iter => `
                        <div class="iteration-item">
                            <div class="iteration-name">${iter.name}</div>
                            <div class="iteration-meta">${iter.date} · ${iter.active_phase || ''}</div>
                            <div class="iteration-phases">
                                ${(iter.completed_phases || []).map(p => '<span class="phase-tag done">${p}</span>').join('')}
                                ${iter.active_phase ? '<span class="phase-tag active">→ ${iter.active_phase}</span>' : ''}
                            </div>
                        </div>
                    `).join('') + '</div>';
            } else {
                ic.innerHTML = '<div class="card-header"><span class="card-title">Iterations</span></div><div style="font-size:0.75rem;color:var(--text-muted);padding:0.5rem">暂无数据</div>';
            }

            // Plans
            const pc = document.querySelector('.plans-card') || createCard('plans-card', 'Plans');
            if (data.plans && data.plans.length > 0) {
                pc.innerHTML = '<div class="card-header"><span class="card-title">Plans</span></div>' +
                    '<div class="plan-list">' +
                    data.plans.map(plan => `
                        <div class="plan-item">
                            <span class="plan-priority ${plan.priority === 'P0' ? 'p0' : plan.priority === 'P1' ? 'p1' : 'p2'}">${plan.priority}</span>
                            <div class="plan-content">
                                <div class="plan-title">${plan.title}</div>
                                <div class="plan-desc">${plan.description || ''}</div>
                            </div>
                            <span class="plan-status ${statusClass(plan.status)}">${plan.status}</span>
                        </div>
                    `).join('') + '</div>';
            } else {
                pc.innerHTML = '<div class="card-header"><span class="card-title">Plans</span></div><div style="font-size:0.75rem;color:var(--text-muted);padding:0.5rem">暂无数据</div>';
            }

            // Design Docs
            const dc = document.querySelector('.docs-card') || createCard('docs-card', '设计文档');
            if (data.design_docs && data.design_docs.length > 0) {
                dc.innerHTML = '<div class="card-header"><span class="card-title">设计文档</span></div>' +
                    '<div class="doc-list">' +
                    data.design_docs.map(doc => `
                        <div class="doc-item">
                            <div>
                                <div class="doc-name">${doc.name}</div>
                                <div class="doc-path">${doc.path}</div>
                            </div>
                            ${doc.version ? '<span style="font-size:0.625rem;color:var(--text-muted)">v${doc.version}</span>' : ''}
                        </div>
                    `).join('') + '</div>';
            } else {
                dc.innerHTML = '<div class="card-header"><span class="card-title">设计文档</span></div><div style="font-size:0.75rem;color:var(--text-muted);padding:0.5rem">暂无数据</div>';
            }

            // Key Gaps
            const gc = document.querySelector('.gaps-card') || createCard('gaps-card', '关键缺口');
            if (data.key_gaps && data.key_gaps.length > 0) {
                gc.innerHTML = '<div class="card-header"><span class="card-title">关键缺口</span></div>' +
                    '<div class="gap-list">' +
                    data.key_gaps.map(gap => `
                        <div class="gap-item">
                            <span class="gap-priority">${gap.priority}</span>
                            <div class="gap-text">
                                <div>${gap.title}</div>
                                ${gap.blocks && gap.blocks.length > 0 ? '<div class="gap-serves">Blocks: ${gap.blocks.join(', ')}</div>' : ''}
                            </div>
                        </div>
                    `).join('') + '</div>';
            } else {
                gc.innerHTML = '<div class="card-header"><span class="card-title">关键缺口</span></div><div style="font-size:0.75rem;color:var(--success);padding:0.5rem">✓ 无关键缺口</div>';
            }

            // Footer
            let f = document.querySelector('footer');
            if (!f) { f = document.createElement('footer'); document.getElementById('dashboard').appendChild(f); }
            f.textContent = 'Plico AI-Native OS · iter' + data.iteration + ' · ' + data.git_branch + ' · 灵魂对齐度 ' + data.soul_alignment_percent + '% · 数据来源：KG Nodes';
        }

        async function fetchStatus() {
            try {
                const resp = await fetch(API + '/api/project/status', { method: 'GET', headers: { 'Accept': 'application/json' }, signal: AbortSignal.timeout(3000) });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                console.log('Project status:', data);
                render(data);
            } catch(e) {
                document.getElementById('error-msg').style.display = 'block';
                console.warn('Dashboard API unreachable:', e.message);
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 5000);
    </script>
</body>
</html>
